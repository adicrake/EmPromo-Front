<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LevaAqui – IMETRO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="container">
      <h1>LevaAqui</h1>
      <p class="subtitle">Compra e vende produtos dentro do campus do IMETRO</p>
    </div>
  </header>

  <!-- MAIN – PRODUTOS -->
  <main class="container">
    <section class="products-grid" id="products-grid">
      <!-- Os cards serão criados pelo JavaScript -->
    </section>
  </main>

  <!-- MODAL DO PERFIL DO VENDEDOR -->
  <div class="modal" id="seller-modal">
    <div class="modal-content">
      <button class="close-modal" id="close-modal">×</button>
      
      <div class="seller-header">
        <img id="modal-seller-photo" class="seller-large-photo" src="" alt="Vendedor">
        <div>
          <h2 id="modal-seller-name"></h2>
          <p id="modal-seller-class"></p>
          <div class="seller-meta">
            <span id="modal-seller-rating"></span>
            <span id="modal-seller-experience"></span>
            <span id="modal-seller-status"></span>
          </div>
        </div>
      </div>

      <h3>Produtos à venda</h3>
      <div class="seller-products" id="modal-seller-products">
        <!-- Cards gerados pelo JS -->
      </div>
    </div>
  </div>

  <!-- LOCATION SECTION -->
  <section class="location">
    <div class="container">
      <h2>Onde nos encontrar</h2>
      <p>📍 Find us at the IMETRO campus, behind the multi-purpose field, in the food area.</p>
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
           alt="Área de comida no campus" class="location-image">
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>Feito com carinho por estudantes do IMETRO</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
