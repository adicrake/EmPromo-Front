<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LevaAqui | Marketplace IMETRO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="logo">LevaAqui</div>
  <nav>
    <a href="#produtos">Produtos</a>
    <a href="#sobre">Sobre</a>
    <a href="#local">Localização</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero" id="sobre">
  <div class="hero-text">
    <h1>Compra e vende dentro da IMETRO</h1>
    <p>Plataforma criada por estudantes para facilitar a venda de produtos entre alunos e comunidade escolar.</p>
  </div>
  <img src="https://images.unsplash.com/photo-1523580846011-d3a5bc25702b?w=900">
</section>

<!-- SEARCH -->
<section class="search-section">
  <input type="text" id="searchInput" placeholder="Pesquisar produto...">
</section>

<!-- PRODUCTS -->
<section class="products" id="produtos"></section>

<!-- LOCATION -->
<section class="location" id="local">
  <div>
    <h2>Visite o nosso espaço físico</h2>
    <p>Campus da IMETRO, atrás do campo desportivo.</p>
  </div>
  <img src="https://images.unsplash.com/photo-1607237138185-eedd9c632b0b?w=900">
</section>

<footer>
  <p>© 2026 LevaAqui - Projecto Estudantil IMETRO</p>
</footer>

<script>

const products = [
 {
  name:"Brownie de Chocolate",
  price:800,
  image:"https://images.unsplash.com/photo-1607920591413-4ec007e70023?w=500",
  seller:"Ana Maria",
  sellerImg:"https://randomuser.me/api/portraits/women/44.jpg"
 },
 {
  name:"Sanduíche Natural",
  price:1200,
  image:"https://images.unsplash.com/photo-1509722747041-616f39b57569?w=500",
  seller:"Carlos Pedro",
  sellerImg:"https://randomuser.me/api/portraits/men/32.jpg"
 },
 {
  name:"Empada de Frango",
  price:700,
  image:"https://images.unsplash.com/photo-1601050690597-df0568f70950?w=500",
  seller:"Helena Costa",
  sellerImg:"https://randomuser.me/api/portraits/women/65.jpg"
 },
 {
  name:"Cookies",
  price:600,
  image:"https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=500",
  seller:"João Miguel",
  sellerImg:"https://randomuser.me/api/portraits/men/54.jpg"
 },
 {
  name:"Sumo Natural",
  price:500,
  image:"https://images.unsplash.com/photo-1551024709-8f23befc6f87?w=500",
  seller:"Paula Santos",
  sellerImg:"https://randomuser.me/api/portraits/women/22.jpg"
 },
 {
  name:"Hambúrguer",
  price:1500,
  image:"https://images.unsplash.com/photo-1550547660-d9450f859349?w=500",
  seller:"Rui Almeida",
  sellerImg:"https://randomuser.me/api/portraits/men/67.jpg"
 },
 {
  name:"Bolo Caseiro",
  price:900,
  image:"https://images.unsplash.com/photo-1542826438-7a60c6eaa2e9?w=500",
  seller:"Marta Silva",
  sellerImg:"https://randomuser.me/api/portraits/women/12.jpg"
 },
 {
  name:"Batata Frita",
  price:700,
  image:"https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=500",
  seller:"André Paulo",
  sellerImg:"https://randomuser.me/api/portraits/men/90.jpg"
 }
];

const productsDiv = document.querySelector(".products");

function renderProducts(list){
 productsDiv.innerHTML = list.map(p=>`
  <div class="card">
   <img class="product-img" src="${p.image}">
   <h3>${p.name}</h3>
   <p class="price">${p.price} Kz</p>

   <div class="seller">
    <img src="${p.sellerImg}">
    <span>${p.seller}</span>
   </div>
  </div>
 `).join("");
}

document.getElementById("searchInput").addEventListener("input", e=>{
 const value = e.target.value.toLowerCase();
 const filtered = products.filter(p => p.name.toLowerCase().includes(value));
 renderProducts(filtered);
});

renderProducts(products);

</script>

</body>
</html>
