<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LevaAqui – IMETRO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="container header-content">
      <div class="brand">
        <h1>LevaAqui</h1>
        <p>Compra e vende produtos dentro do campus do IMETRO</p>
      </div>
      <a href="admin/admin.html" class="admin-btn" aria-label="Painel de administração">
        🔐 Admin
      </a>
    </div>
  </header>

  <main class="container">
    <section class="products-grid" id="products-grid">
      <!-- product cards gerados via JS -->
    </section>
  </main>

  <!-- Modal de perfil do vendedor -->
  <div class="modal" id="seller-modal">
    <div class="modal-content">
      <button class="modal-close" aria-label="Fechar">×</button>
      <div class="seller-profile" id="seller-profile-content">
        <!-- conteúdo dinâmico -->
      </div>
    </div>
  </div>

  <footer>
    <div class="container">
      <p>📍 Encontra-nos no campus do IMETRO, atrás do campo multiuso, na zona de alimentação.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
