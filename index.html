<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Mercado dos Estudantes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🍔 Mercado dos Estudantes</h1>
    <p>Produtos feitos por estudantes, para estudantes</p>
</header>

<main class="produtos">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1604908177522-4326ef9c2b38" alt="Bolo caseiro">
        <h2>Bolo de Chocolate</h2>
        <p class="preco">2,50 €</p>
        <p class="rating">⭐ 4.8</p>
        <a href="produto.html" class="btn">Ver detalhes</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1589302168068-964664d93dc0" alt="Sandes">
        <h2>Sandes Natural</h2>
        <p class="preco">1,80 €</p>
        <p class="rating">⭐ 4.5</p>
        <a href="produto.html" class="btn">Ver detalhes</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1605475128023-3f7e6f2b8d60" alt="Brigadeiro">
        <h2>Brigadeiros</h2>
        <p class="preco">0,50 €</p>
        <p class="rating">⭐ 5.0</p>
        <a href="produto.html" class="btn">Ver detalhes</a>
    </div>

</main>

<footer>
    <p>© 2026 - Projeto Escolar</p>
</footer>

</body>
</html>
