<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Vendedores - LevaAqui</title>
    <link rel="stylesheet" href="admin_vendedores.css">
</head>
<body>
    <div class="container">
        <h1>Cadastro de Vendedores</h1>
        <p>Preencha os dados do vendedor. O ADM define as informações iniciais.</p>

        <form id="vendedorForm">
            <div class="form-group">
                <label for="nome">Nome do Vendedor:</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>
            </div>

            <div class="form-group">
                <label for="foto">Foto do Vendedor:</label>
                <input type="file" id="foto" name="foto" accept="image/*" required>
            </div>

            <div class="form-group">
                <label for="sala">Sala de Aula / Local:</label>
                <input type="text" id="sala" name="sala" placeholder="Ex: Sala 101" required>
            </div>

            <div class="form-group">
                <label for="tempo">Tempo de Venda:</label>
                <input type="text" id="tempo" name="tempo" placeholder="Ex: 2 anos" required>
            </div>

            <div class="form-group">
                <label>Classificação:</label>
                <div class="stars">
                    <input type="radio" name="estrela" value="5" id="star5"><label for="star5">★</label>
                    <input type="radio" name="estrela" value="4" id="star4"><label for="star4">★</label>
                    <input type="radio" name="estrela" value="3" id="star3"><label for="star3">★</label>
                    <input type="radio" name="estrela" value="2" id="star2"><label for="star2">★</label>
                    <input type="radio" name="estrela" value="1" id="star1"><label for="star1">★</label>
                </div>
            </div>

            <div class="form-group">
                <label for="categorias">Categorias de Produtos:</label>
                <select id="categorias" name="categorias" multiple required>
                    <option value="gelados">Gelados</option>
                    <option value="bebidas">Bebidas</option>
                    <option value="salgados">Salgados</option>
                    <option value="doces">Doces</option>
                    <option value="sandwiches">Sandwiches</option>
                    <option value="snacks">Snacks</option>
                </select>
                <small>Segure CTRL para selecionar mais de uma categoria</small>
            </div>

            <button type="submit" class="btn">Cadastrar Vendedor</button>
        </form>
    </div>

    <script src="admin_vendedores.js"></script>
</body>
</html>
