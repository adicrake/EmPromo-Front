<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>LevaAqui Admin</title>
<link rel="stylesheet" href="admin.css">
</head>

<body>

<div id="loginBox" class="login">
<h2>LevaAqui | Administração</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div id="dashboard" class="dashboard">

<aside>
<h2>LevaAqui</h2>
<button onclick="openVendors()">Vendedores</button>
<button onclick="openProducts()">Produtos</button>
</aside>

<main>

<section id="vendorsBox" class="box">
<h3>Cadastrar Vendedor</h3>
<input id="vName" placeholder="Nome">
<input id="vSala" placeholder="Sala">
<input type="file" id="vImg">

<button onclick="saveVendor()">Guardar Vendedor</button>

<div id="vendorsList"></div>
</section>

<section id="productsBox" class="box">
<h3>Cadastrar Produto</h3>

<input id="pName" placeholder="Nome do Produto">
<input id="pPrice" type="number" placeholder="Preço">

<select id="pCat">
<option>Gelados</option>
<option>Bebidas</option>
<option>Salgados</option>
<option>Doces</option>
<option>Fast Food</option>
<option>Lanches</option>
<option>Outros</option>
</select>

<select id="pVendor"></select>

<input type="file" id="pImg">

<button onclick="saveProduct()">Guardar Produto</button>

<div id="productsList"></div>
</section>

</main>

</div>

<script src="admin.js"></script>
</body>
</html>
