<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>LevaAqui ADM</title>
<link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="login" id="loginBox">
<h2>LevaAqui Admin</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div class="dashboard" id="dashboard">
<aside>
<h2>LevaAqui</h2>
<button onclick="showForm()">Cadastrar Produto</button>
<button onclick="showList()">Produtos</button>
</aside>

<main>

<div id="formBox">
<h3>Novo Produto</h3>

<input id="pname" placeholder="Nome do Produto">
<input id="pprice" placeholder="Preço (Kz)">
<select id="pcat">
<option value="gelados">Gelados</option>
<option value="bebidas">Bebidas</option>
<option value="salgados">Salgados</option>
</select>

<input id="pimg" placeholder="Link da imagem do produto">
<input id="vname" placeholder="Nome do vendedor">
<input id="vimg" placeholder="Link foto vendedor">

<button onclick="saveProduct()">Guardar</button>
</div>

<div id="listBox"></div>

</main>
</div>

<script src="admin.js"></script>
</body>
</html>
